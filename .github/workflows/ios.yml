name: iOS CI

on:
  push:
    branches:
      - main
      - "cursor/**"
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Test Aixcam
        run: >
          xcodebuild test
          -scheme Aixcam
          -destination 'platform=iOS Simulator,name=iPhone 16'
          CODE_SIGNING_ALLOWED=NO
